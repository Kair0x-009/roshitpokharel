  <style>
    :root {
    --ball-size: 25px;
    --animation-duration: 30s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: #000;
    overflow: hidden;
}

header {
    background-color: darkslategrey;
    padding: 10px;
    text-align: center;
}

#logo {
    font-size: 2rem;
    font-family: 'Courier New', Courier, monospace;
    color: white;
}

nav {
    display: flex;
    justify-content: space-between;
    background-color: cadetblue;
    padding: 15px;
    font-size: 18px;
    gap: 20px;
    opacity: 0.9;
    text-transform: uppercase;
}

nav a {
    text-decoration: none;
    color: white;
}

nav a:hover {
    background-color: black;
    color: white;
    padding: 5px;
    border-radius: 5px;
}

main {
    text-align: center;
    flex-grow: 1;
    padding: 20px;
}

@keyframes grow {
    0%   { border-color: red; transform: scale(0.90); }
    25%  { border-color: blue; }
    50%  { border-color: yellow; }
    75%  { border-color: green; }
    100% { border-color: red; }
}

.profile > img {
    animation-name: grow;
    animation-duration: 1s;
    animation-timing-function: linear;
    animation-delay: 2s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
}

.profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    border-radius: 10px;
    max-width: 800px;
    margin: 20px auto;
}

.profile img {
    border: 5px solid white;
    max-width: 200px;
    border-radius: 50%;
}

.profile h1, .profile h2 {
    margin: 10px 0;
}

.profile h1 {
    font-size: 2rem;
    color: #00ffff;
}

.profile h2 a {
    color: #00ffff;
    text-decoration: none;
}

.profile h2 a:hover {
    text-decoration: underline;
}

.follow {
    text-align: center;
    padding: 20px;
    background-color: black;
    color: white;
}

.follow a {
    text-decoration: none;
    color: #00ffff;
    margin: 0 10px;
    font-weight: bold;
}

.follow a:hover {
    color: white;
}

footer {
    text-align: center;
    background-color: darkslategrey;
    color: aliceblue;
    padding: 10px;
    font-size: 1rem;
}

.review-form {
    text-align: center;
    padding: 20px;
    margin: 20px auto;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border-radius: 10px;
    max-width: 600px;
}

.review-form h2 {
    margin-bottom: 20px;
}

.review-form input, 
.review-form textarea, 
.review-form button {
    width: 80%;
    margin: 10px auto;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

.review-form input, 
.review-form textarea {
    background: #f4f4f4;
    color: #333;
}

.review-form button {
    background-color: #00ffff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

.review-form button:hover {
    background-color: #007f7f;
}

/* Next Page Button Styling */
.next-page {
    text-align: center;
    margin: 20px auto;
}

.next-page button {
    background-color: #00ffff;
    color: #000;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease;
}

.next-page button:hover {
    background-color: #007f7f;
    transform: scale(1.05);
}

.container {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -1;
}

.balls {
    position: absolute;
    width: 100%;
    height: 100%;
    filter: contrast(10px);
}

.ball {
    position: absolute;
    border-radius: 50%;
    animation: float var(--animation-duration) linear infinite both;
    will-change: transform;
    mix-blend-mode: screen;
    cursor: pointer;
    opacity: 0.9;
    transform-origin: center;
}

@keyframes float {
    0%, 100% {
        transform: translate(
            calc(var(--tx-1) * 1vw),
            calc(var(--ty-1) * 1vh)
        );
    }
    25% {
        transform: translate(
            calc(var(--tx-2) * 1vw),
            calc(var(--ty-2) * 1vh)
        );
    }
    50% {
        transform: translate(
            calc(var(--tx-3) * 1vw),
            calc(var(--ty-3) * 1vh)
        );
    }
    75% {
        transform: translate(
            calc(var(--tx-4) * 1vw),
            calc(var(--ty-4) * 1vh)
        );
    }
}

  </style>
